<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<title>JARVIS OS</title>
<style>
  :root {
    --bg-color: #050505;
    --glass-bg: rgba(20, 20, 25, 0.6);
    --glass-border: rgba(255, 255, 255, 0.08);
    --accent: #0a84ff;
    --text-main: #f5f5f7;
    --text-muted: #86868b;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1a1a24 0%, var(--bg-color) 100%);
    color: var(--text-main);
    margin: 0;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
  }
  #sidebar-left { width: 260px; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; padding: 20px; }
  #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
  #sidebar-right { width: 280px; border-left: 1px solid var(--glass-border); padding: 20px; display: flex; flex-direction: column; }
  @media (max-width: 800px) { #sidebar-left, #sidebar-right { display: none; } }
  h2 { font-size: 0.9em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;}
  .history-item, .integration-item {
    padding: 12px; margin-bottom: 10px; border-radius: 10px;
    background: rgba(255,255,255,0.03); cursor: pointer; transition: 0.2s; font-size: 0.9em;
  }
  #header { padding: 20px; text-align: center; font-weight: 600; letter-spacing: 2px; border-bottom: 1px solid var(--glass-border); }
  #chat-box { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
  .message { max-width: 80%; padding: 16px 20px; border-radius: 18px; line-height: 1.5; font-size: 1.05em; white-space: pre-wrap; }
  .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
  .bot { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
  #input-area { padding: 20px; border-top: 1px solid var(--glass-border); display: flex; gap: 12px; align-items: center; padding-bottom: env(safe-area-inset-bottom, 20px); }
  .action-btn { background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2em; transition: 0.2s; }
  .recording { background: #ff453a !important; box-shadow: 0 0 15px rgba(255,69,58,0.5); }
  input { flex: 1; padding: 14px 20px; background: rgba(0,0,0,0.4); color: white; border: 1px solid var(--glass-border); border-radius: 20px; font-size: 1em; outline: none; }
  input:focus { border-color: var(--accent); background: rgba(0,0,0,0.6); }
  #send-btn { background: var(--accent); border: none; color: white; padding: 0 24px; border-radius: 20px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div id="sidebar-left" class="glass">
  <h2>Historial de Sistema</h2>
  <div class="history-item">💬 Configuración Inicial</div>
  <div style="margin-top: auto; font-size: 0.8em; color: var(--text-muted);">Búsqueda: Pendiente</div>
</div>
<div id="main-chat">
  <div id="header" class="glass">J.A.R.V.I.S. INTERFACE</div>
  <div id="chat-box"></div>
  <div id="input-area" class="glass">
    <button class="action-btn" title="Adjuntar Archivos">📎</button>
    <button id="mic-btn" class="action-btn" onclick="toggleMic()" title="Dictado por Voz">🎤</button>
    <input type="text" id="user-input" placeholder="Ingresa comando o código..." onkeypress="handleEnter(event)">
    <button id="send-btn" onclick="sendMessage()">Ejecutar</button>
  </div>
</div>
<div id="sidebar-right" class="glass">
  <h2>Módulos Apple</h2>
  <div class="integration-item">☁️ iCloud Sync (Fase 3)</div>
  <div style="margin-top: 30px;">
    <h2>Modelo Activo</h2>
    <div class="integration-item" style="border: 1px solid var(--accent);">Gemini 1.5 Flash (Rápido)</div>
  </div>
</div>
  <script type="module">
  // 1. Importaciones directas de la arquitectura modular de Google
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 2. Credenciales de acceso de tu base de datos "jarvis-os-backend"
  const firebaseConfig = {
    apiKey: "AQ.Ab8RN6KAKwwxmKTUEOHk9YxCH5ceqrMKT_9ZXSFgjSHZ4rjINw",
    authDomain: "jarvis-os-backend.firebaseapp.com",
    projectId: "jarvis-os-backend",
    storageBucket: "jarvis-os-backend.firebasestorage.app",
    messagingSenderId: "613119230333",
    appId: "1:613119230333:web:c4b5beb3cc5814b1630c14",
    measurementId: "G-B71XPBPGVW"
  };

  // 3. Inicializar el motor de la base de datos
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 4. Función global de guardado para que JARVIS/VIOLETA la utilice
  window.guardarMensaje = async function(usuario, texto) {
    try {
      const docRef = await addDoc(collection(db, "usuarios", "juan_jose", "conversaciones"), {
        usuario: usuario,
        mensaje: texto,
        fecha: serverTimestamp() 
      });
      console.log("✅ Memoria guardada con éxito. ID: ", docRef.id);
    } catch (error) {
      console.error("🚨 Error crítico al guardar en Firestore: ", error);
    }
  }
</script>


<script>
  // 1. ELIMINA EL TEXTO TU_CLAVE_API_AQUI Y PEGA TU CLAVE ENTRE LAS COMILLAS SIMPLES
  const API_KEY = 'AQ.Ab8RN6KAKwwxmKTUEOHk9YxCH5ceqrMKT_9ZXSFgjSHZ4rjI'; 
  
  const INSTRUCCIONES_JARVIS = `Eres JARVIS. Actúas como Claude Code: un ingeniero de software autónomo y analítico. Tus respuestas deben ser ultra directas, sin introducciones amables. Analiza paso a paso los problemas de código. Genera scripts funcionales y optimizados.`;

  const chatBox = document.getElementById('chat-box');
  const userInput = document.getElementById('user-input');
  let conversationHistory = [];
  let isRecording = false;
  let recognition;

  if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'es-ES';
    recognition.onresult = (e) => { userInput.value += e.results[0][0].transcript; toggleMic(); };
    recognition.onerror = () => toggleMic();
  }

  function toggleMic() {
    if (!recognition) return alert("Tu navegador no soporta dictado por voz.");
    const micBtn = document.getElementById('mic-btn');
    if (isRecording) { recognition.stop(); micBtn.classList.remove('recording'); } 
    else { recognition.start(); micBtn.classList.add('recording'); }
    isRecording = !isRecording;
  }

  function addMessage(text, sender) {
    const msg = document.createElement('div');
    msg.classList.add('message', sender);
    msg.textContent = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    window.guardarMensaje("Juan José", text);
    userInput.value = '';
    
    conversationHistory.push({ "role": "user", "parts": [{ "text": text }] });

    try {
      const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + API_KEY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: INSTRUCCIONES_JARVIS }] },
          contents: conversationHistory
        })
      });
      if (!response.ok) throw new Error('Error en API');
      const data = await response.json();
      const reply = data.candidates[0].content.parts[0].text;
      
      addMessage(reply, 'bot');
      window.guardarMensaje("Violeta", reply);
      conversationHistory.push({ "role": "model", "parts": [{ "text": reply }] });
    } catch (error) {
      addMessage("⚠️ Error de conexión al servidor principal. Verifica tu clave API.", 'bot');
      conversationHistory.pop();
    }
  }
</script>
</body>
</html>
